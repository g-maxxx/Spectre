version: 2

updates:
  - package-ecosystem: gradle
    directory: "/"
    schedule:
      interval: weekly
      time: "06:00"
      timezone: Europe/Paris
    cooldown:
      default-days: 3
      semver-major-days: 7
      semver-minor-days: 5
      semver-patch-days: 2
    commit-message:
      prefix: deps
      include: scope
    labels:
      - dependencies
      - gradle
    groups:
      compose:
        patterns:
          - "androidx.compose.*"
          - "org.jetbrains.kotlin.plugin.compose"
      kotlin:
        patterns:
          - "org.jetbrains.kotlin.*"
        exclude-patterns:
          - "org.jetbrains.kotlin.plugin.compose"
      androidx:
        patterns:
          - "androidx.*"
        exclude-patterns:
          - "androidx.compose.*"
      android-tools:
        patterns:
          - "com.android.*"
      formatter:
        patterns:
          - "com.diffplug.spotless"

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      time: "06:00"
      timezone: Europe/Paris
    open-pull-requests-limit: 3
    cooldown:
      default-days: 3
    commit-message:
      prefix: ci
      include: scope
    labels:
      - dependencies
      - ci
    ignore:
      - dependency-name: "*"
        update-types:
          - version-update:semver-patch
          - version-update:semver-minor
    groups:
      actions:
        patterns:
          - "*"
